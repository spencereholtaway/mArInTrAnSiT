name: Update GTFS Data

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6am UTC
  workflow_dispatch: {}    # Allow manual trigger

permissions:
  contents: write

jobs:
  update-gtfs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Download and process GTFS feed
        run: node scripts/update-gtfs.cjs
        env:
          MARIN_TRANSIT_API_KEY: ${{ secrets.MARIN_TRANSIT_API_KEY }}

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet src/data/routeData.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/routeData.json
          git commit -m "Update GTFS route data"
          git push
